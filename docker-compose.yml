services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scouts_quartermaster
    ports:
      - "5432:5432"
    volumes:
      - scouts_quartermaster_pg:/var/lib/postgresql/data

volumes:
  scouts_quartermaster_pg:

